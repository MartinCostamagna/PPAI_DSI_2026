<div class="panel">
  <div class="panel-header">
    <div class="cm-field">
      <span class="label">CM</span>
      <span class="value">{{ cmActual }}</span>
    </div>
    <div class="fecha-hora">
      {{ fechaHoraActual | date: 'dd/MM/yyyy HH:mm:ss' }}
    </div>
  </div>

  <div class="bolsines-scroll">
    <div class="bolsin-item" *ngFor="let bolsin of bolsines">
      <span>{{ bolsin.codigo }}</span>
      <span>{{ bolsin.estado }}</span>
      <span>{{ bolsin.fecha | date: 'dd/MM/yyyy' }}</span>
    </div>

    <div class="empty-state" *ngIf="bolsines.length === 0">
      No se encontraron bolsines.
    </div>
  </div>
</div>
