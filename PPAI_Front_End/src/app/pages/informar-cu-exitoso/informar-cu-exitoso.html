<!-- Mostramos los mensajes finales -->
<!-- Primero un mensaje específico de la ejecución del registro de recepción del bolsín -->
<!-- Luego un mensaje de éxito de la ejecución del caso de uso -->
@if (!quiereSalir) {
    <div class="overlay">
        <div class="card">
            <div class="icono">✔</div>
            <h2 class="titulo">{{ mensaje() }}</h2>
            <div>
                <button class="btnVolver" (click)="volver()">Volver al inicio</button>
                <button class="btnFinCU" (click)="informarEjecucionExitosaCU()">Fin CU</button>
            </div>
        </div>
    </div>
} @else {
    <div class="overlay">
        <div class="card">
            <div class="icono">✔</div>
            <h2 class="titulo">{{ mensaje() }}</h2>
        </div>
    </div>
}
