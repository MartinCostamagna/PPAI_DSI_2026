<div class="divComision">
    <button type="button" class="btn-cancelar-nav" (click)="cancelar()">Cancelar</button>
    <span class="labelComision">Comision Medica: {{ comisionMedica() }}</span>
</div>

<div class="divBolsines">
    <div class="buscador">
        <input type="text" placeholder="Filtrar por CM o precinto..." (input)="filtro.set($any($event.target).value)"/>
    </div>
    <table class="bolsines">
        <thead>
            <th></th>
            <th>Comision Medica de Origen</th>
            <th>N° Precinto Bolsín</th>
        </thead>
        <tbody>
            @for (bolsin of bolsinesFiltrados(); track bolsin.numeroPrecinto) {
                <tr (click)="seleccionar(bolsin)">
                    <td>
                        <input type="radio" name="bolsinSelector" [checked]="bolsinSeleccionado === bolsin">
                    </td>
                    <td>{{ bolsin.nombreCMOrigen }}</td>
                    <td>{{ bolsin.numeroPrecinto }}</td>
                </tr>
            }
        </tbody>
    </table>

    <button type="button" class="btnSeleccion" (click)="tomarSeleccionBolsin()"> Seleccionar Bolsin </button>
</div>
